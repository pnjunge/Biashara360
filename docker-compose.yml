# docker-compose.yml for local development
# For Railway deployment, use railway.json instead

services:
  postgres:
    image: postgres:16-alpine
    container_name: biashara360-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biashara360}
      POSTGRES_USER: ${POSTGRES_USER:-biashara360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biashara360}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: biashara360-api
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/biashara360}
      DB_USER: ${DB_USER:-biashara360}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-your_consumer_key}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-your_consumer_secret}
      MPESA_SHORT_CODE: ${MPESA_SHORT_CODE:-174379}
      MPESA_PASS_KEY: ${MPESA_PASS_KEY:-your_pass_key}
      MPESA_ENV: ${MPESA_ENV:-sandbox}
      CS_MERCHANT_ID: ${CS_MERCHANT_ID:-your_merchant_id}
      CS_MERCHANT_KEY_ID: ${CS_MERCHANT_KEY_ID:-your_key_id}
      CS_MERCHANT_SECRET_KEY: ${CS_MERCHANT_SECRET_KEY:-your_shared_secret}
      CS_ENVIRONMENT: ${CS_ENVIRONMENT:-sandbox}
      KRA_ETIMS_ENV: ${KRA_ETIMS_ENV:-sandbox}
      META_APP_ID: ${META_APP_ID:-your_meta_app_id}
      META_APP_SECRET: ${META_APP_SECRET:-your_meta_app_secret}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY:-your_tiktok_client_key}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-your_tiktok_client_secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-your_anthropic_api_key}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-https://your-domain.com/v1/social/webhook}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

