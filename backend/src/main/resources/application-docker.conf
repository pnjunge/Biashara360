ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.app.biashara.ApplicationKt.module ]
    }
}

database {
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = ${?DB_USER}
    password = ${?DB_PASSWORD}
    maxPoolSize = 10
}

jwt {
    secret = ${?JWT_SECRET}
    issuer = "biashara360.co.ke"
    audience = "biashara360-users"
    realm = "Biashara360 API"
    accessTokenExpiry = 3600
    refreshTokenExpiry = 2592000
}

mpesa {
    consumerKey = ${?MPESA_CONSUMER_KEY}
    consumerSecret = ${?MPESA_CONSUMER_SECRET}
    shortCode = ${?MPESA_SHORT_CODE}
    passKey = ${?MPESA_PASS_KEY}
    callbackUrl = "https://api.biashara360.co.ke/v1/payments/mpesa/callback"
    callbackUrl = ${?MPESA_CALLBACK_URL}
    environment = ${?MPESA_ENV}
}

otp {
    expiryMinutes = 10
    length = 6
}

cybersource {
    merchantId = ${?CS_MERCHANT_ID}
    orgUnitId = ${?CS_ORG_UNIT_ID}
    apiKey = ${?CS_API_KEY}
    sharedSecret = ${?CS_SHARED_SECRET}
}

etims {
    clientId = ${?ETIMS_CLIENT_ID}
    clientSecret = ${?ETIMS_CLIENT_SECRET}
    apiKey = ${?ETIMS_API_KEY}
}

kra {
    pin = ${?KRA_PIN}
    apiKey = ${?KRA_API_KEY}
}

social {
    whatsappToken = ${?WHATSAPP_TOKEN}
    instagramToken = ${?INSTAGRAM_TOKEN}
    facebookToken = ${?FACEBOOK_TOKEN}
    tiktokToken = ${?TIKTOK_TOKEN}
}

