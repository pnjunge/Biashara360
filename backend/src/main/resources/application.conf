ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.app.biashara.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://biashara360-db:5432/biashara360"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "postgres"
    user = ${?DB_USER}
    password = "postgres"
    password = ${?DB_PASSWORD}
    maxPoolSize = 10
}

jwt {
    secret = "biashara360-super-secret-jwt-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "biashara360.co.ke"
    audience = "biashara360-users"
    realm = "Biashara360 API"
    accessTokenExpiry = 3600       # 1 hour in seconds
    refreshTokenExpiry = 2592000   # 30 days in seconds
}

mpesa {
    consumerKey = ${?MPESA_CONSUMER_KEY}
    consumerSecret = ${?MPESA_CONSUMER_SECRET}
    shortCode = ${?MPESA_SHORT_CODE}
    passKey = ${?MPESA_PASS_KEY}
    callbackUrl = "https://api.biashara360.co.ke/v1/payments/mpesa/callback"
    callbackUrl = ${?MPESA_CALLBACK_URL}
    environment = "sandbox"   # "sandbox" or "production"
    environment = ${?MPESA_ENV}
}

otp {
    expiryMinutes = 10
    length = 6
}

cybersource {
    merchantId     = "YOUR_MERCHANT_ID"
    merchantId     = ${?CS_MERCHANT_ID}
    merchantKeyId  = "YOUR_KEY_ID"
    merchantKeyId  = ${?CS_MERCHANT_KEY_ID}
    merchantSecretKey = "YOUR_SHARED_SECRET"
    merchantSecretKey = ${?CS_MERCHANT_SECRET_KEY}
    environment    = "sandbox"    # "sandbox" or "production"
    environment    = ${?CS_ENVIRONMENT}
    # For JWT/P12 auth (recommended over HTTP sig from Sept 2026):
    # p12KeyAlias    = ${?CS_P12_KEY_ALIAS}
    # p12KeyPassword = ${?CS_P12_KEY_PASSWORD}
    # p12KeyPath     = ${?CS_P12_KEY_PATH}
}

kra {
    # KRA eTIMS API endpoints (do not change)
    etimsSandboxUrl    = "https://etims-sbx.kra.go.ke/etims-api"
    etimsProductionUrl = "https://etims.kra.go.ke/etims-api"
    # Default environment - override per business profile in DB
    etimsEnvironment   = "sandbox"
    etimsEnvironment   = ${?KRA_ETIMS_ENV}
}

social {
    # Meta (WhatsApp, Instagram, Facebook) App credentials
    metaAppId     = ${?META_APP_ID}
    metaAppSecret = ${?META_APP_SECRET}
    # TikTok for Business App credentials
    tiktokClientKey    = ${?TIKTOK_CLIENT_KEY}
    tiktokClientSecret = ${?TIKTOK_CLIENT_SECRET}
    # Claude AI for auto-replies
    anthropicApiKey = ${?ANTHROPIC_API_KEY}
    # Base URL for webhooks (registered on Meta/TikTok developer consoles)
    webhookBaseUrl = "https://api.biashara360.co.ke/v1/social/webhook"
    webhookBaseUrl = ${?WEBHOOK_BASE_URL}
}
